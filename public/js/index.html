<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>QuickBuy</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel='stylesheet' href='./css/style.css'>

</head>

<body>
    <div class="main">
        <nav>
            <div class="logo">
                <h1><b>Q</b></h1>
                <h4><b>QuickBuy</b></h4>
            </div>
            <div class="option">
                <a href="/">Home</a>
                <a href="/">Shopping</a>
                <a href="/">About</a>
                <a href="/">Service</a>
                <a href="/">Contact</a>
            </div>
            <div class="search">
                <input type="search" name="item" id="search-box" placeholder="Search for items">
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i>&nbsp;Search</button>
                
            </div>
            <div class="authentication">
                <a href="/">Log out</a>
            </div>
        </nav>
        <div class="page1">
            <!-- <img src="backgroundhome.jpg" alt=""> -->
             <div class="login-page">
                <div class="login-with-email">
                    <h1>Login Here</h1>
                    <form action="">
                        <input type="email" name="email_id" id="email-id" placeholder="Enter your email">
                        <input type="password" name="password" id="password" placeholder="Enter your password">
                        <button>Login</button>
                    </form>
                    <p>don't have account?</p>
                    <p><a href="#">Sign up</a>&nbsp; &nbsp;here</p>
                </div>
                <div class="login-with-app">
                    <div class="app-option">
                        <p>Login with</p>
                        <div class="app-link">
                            <a href="#"><i class="fa-brands fa-google"></i></a>
                            <a href="#"><i class="fa-brands fa-facebook"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        </div>
                    </div>
                </div>
             </div>
             <div class="description">
                <h1>QuickBuy -</h1>
                <h1>Smart Shopping</h1>
                <h1>Made Easy.</h1>
                <p>Discover quality products, secure payments, and fast checkout—all in one place.</p>
                <a href="#">Start Shopping</a>
             </div>
        </div>
    </div>
</body>
<script src='./js/script.js'></script>
</html>
